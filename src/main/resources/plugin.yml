name: AntiJoinSpam
version: '1.0-SNAPSHOT'
main: xyz.moosh.antiJoinSpam.AntiJoinSpam
api-version: '1.21'
authors: [ Moosh ]
github: 'https://github.com/Mooshlol304/AntiJoinSpam'
description: Suppresses join/leave broadcasts for players who relog too frequently.
folia-supported: true

softdepend:
  - Essentials

commands:
  antijoinspam:
    description: Manage AntiJoinSpam settings.
    usage: /<command> <reload|clear>
    aliases: [ ajs ]
    permission: antijoinspam.admin

permissions:
  antijoinspam.admin:
    description: Access to all /antijoinspam sub-commands.
    default: op